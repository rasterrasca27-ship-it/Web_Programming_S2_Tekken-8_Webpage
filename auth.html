<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | TEKKEN 8</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <a href="WEBSITE.HTML" class="auth-background-link" aria-label="Go to Tekken 8 cover page"></a>
    <main>
        <section class="auth-section" aria-labelledby="auth-heading">
            <div class="container">
                <div class="section-header">
                    <div class="auth-logo">TEKKEN 8</div>
                    <h2 id="auth-heading" class="section-title">Login / Sign Up</h2>
                    <p class="section-subtitle">Sign in or create your account to continue.</p>
                </div>
                <div class="auth-card">
                    <div class="auth-switch" role="tablist" aria-label="Authentication tabs">
                        <button type="button" class="auth-toggle active" data-form="login" aria-pressed="true" role="tab">Login</button>
                        <button type="button" class="auth-toggle" data-form="signup" aria-pressed="false" role="tab">Sign Up</button>
                    </div>
                    <div class="auth-forms">
                        <form id="login-form" class="auth-form" aria-live="polite">
                            <div class="form-field">
                                <label for="login-email">Email</label>
                                <input id="login-email" type="email" placeholder="you@example.com" required />
                            </div>
                            <div class="form-field">
                                <label for="login-password">Password</label>
                                <input id="login-password" type="password" placeholder="Enter your password" required minlength="6" />
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="auth-button">Log In</button>
                            </div>
                        </form>

                        <form id="signup-form" class="auth-form hidden" aria-live="polite">
                            <div class="form-field">
                                <label for="signup-name">Username</label>
                                <input id="signup-name" type="text" placeholder="Your handle" required />
                            </div>
                            <div class="form-field">
                                <label for="signup-email">Email</label>
                                <input id="signup-email" type="email" placeholder="you@example.com" required />
                            </div>
                            <div class="form-field">
                                <label for="signup-password">Password</label>
                                <input id="signup-password" type="password" placeholder="Create a password" required minlength="6" />
                            </div>
                            <div class="form-field">
                                <label for="signup-confirm">Confirm Password</label>
                                <input id="signup-confirm" type="password" placeholder="Repeat your password" required minlength="6" />
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="auth-button">Sign Up</button>
                            </div>
                        </form>
                    </div>
                    <div id="auth-status" class="auth-status" aria-live="polite">Enter your login details to sign in.</div>
                    <div class="text-center" style="margin-top: 24px;">
                        <a href="WEBSITE.HTML" class="btn-auth" style="padding: 12px 28px;">← Back to Home</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="auth.js"></script>
</body>
</html>
